<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 500px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.15);
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 12px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #1d4ed8;
        }
        .result {
            margin-top: 20px;
            padding: 12px;
            text-align: center;
            background: #eef6ff;
            border-radius: 8px;
            font-weight: bold;
            color: #0f172a;
        }
        .back {
            display: block;
            text-align: center;
            margin-top: 16px;
            text-decoration: none;
            color: #2563eb;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Diabetes Prediction</h1>

        <form method="POST" action="/diabetes">
            <label>Pregnancies</label>
            <input type="number" name="pregnancies" required>

            <label>Glucose</label>
            <input type="number" name="Glucose" required>

            <label>Blood Pressure</label>
            <input type="number" name="BloodPressure" required>

            <label>Skin Thickness</label>
            <input type="number" name="skin_thickness" required>

            <label>Insulin</label>
            <input type="number" name="insulin" required>

            <label>BMI</label>
            <input type="number" step="any" name="BMI" required>

            <label>Diabetes Pedigree Function</label>
            <input type="number" step="any" name="DiabetesPedigreeFunction" required>

            <label>Age</label>
            <input type="number" name="Age" required>

            <button type="submit">Predict</button>
        </form>

        {% if final_result %}
            <div class="result">
                Prediction Result: {{ final_result }}
            </div>
        {% endif %}

        <a class="back" href="/">Back to Home</a>
    </div>
</body>
</html>
