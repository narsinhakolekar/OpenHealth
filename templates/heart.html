<!DOCTYPE html>
<html>

<head>

<title>Heart Disease Prediction</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
}


.container{

    width:600px;
    margin:40px auto;
    background:#111827;
    padding:30px;
    border-radius:15px;

}


input,select{

    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:8px;

}


button{

    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;

}


.result{

    margin-top:20px;
    padding:15px;
    background:#1e293b;
    border-radius:10px;

}


</style>

</head>


<body>


<div class="container">


<h1>
Heart Disease Prediction
</h1>


<form method="POST">


<label>Age</label>
<input 
type="number"
name="Age"
required>



<label>Sex</label>

<select name="Sex">

<option value="M">
Male
</option>

<option value="F">
Female
</option>

</select>



<label>Chest Pain Type</label>

<select name="ChestPainType">

<option value="ATA">ATA</option>

<option value="NAP">NAP</option>

<option value="ASY">ASY</option>

<option value="TA">TA</option>

</select>



<label>Resting Blood Pressure</label>

<input 
type="number"
name="RestingBP"
required>



<label>Cholesterol</label>

<input
type="number"
name="Cholesterol"
required>



<label>Fasting Blood Sugar</label>

<select name="FastingBS">

<option value="0">
0
</option>

<option value="1">
1
</option>

</select>



<label>Resting ECG</label>

<select name="RestingECG">

<option value="Normal">
Normal
</option>

<option value="ST">
ST
</option>

<option value="LVH">
LVH
</option>

</select>




<label>Maximum Heart Rate</label>

<input
type="number"
name="MaxHR"
required>




<label>Exercise Angina</label>

<select name="ExerciseAngina">

<option value="N">
No
</option>

<option value="Y">
Yes
</option>


</select>




<label>Old Peak</label>

<input
type="number"
step="0.1"
name="Oldpeak"
required>




<label>ST Slope</label>

<select name="ST_Slope">

<option value="Up">
Up
</option>

<option value="Flat">
Flat
</option>

<option value="Down">
Down
</option>


</select>



<br><br>


<button type="submit">
Predict
</button>


</form>



{% if final_result %}

<div class="result">

<h2>
{{final_result}}
</h2>

</div>

{% endif %}



</div>


</body>

</html>
