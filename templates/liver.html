<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenHealth | Liver Disease Prediction</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin:0;
            padding:0;
        }
        .container{
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        h1{
            text-align:center;
            color:#1f3c88;
            margin-bottom:25px;
        }
        form{
            display:grid;
            grid-template-columns: repeat(2, 1fr);
            gap:16px;
        }
        .full{
            grid-column:1 / -1;
        }
        label{
            display:block;
            font-weight:600;
            margin-bottom:6px;
            color:#333;
        }
        input, select{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:10px;
            font-size:15px;
            box-sizing:border-box;
        }
        button{
            grid-column:1 / -1;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#1f3c88;
            color:white;
            font-size:16px;
            font-weight:700;
            cursor:pointer;
        }
        button:hover{
            background:#17306d;
        }
        .result{
            margin-top:25px;
            padding:18px;
            border-radius:12px;
            background:#eef5ff;
            border-left:6px solid #1f3c88;
        }
        .error{
            margin-top:25px;
            padding:18px;
            border-radius:12px;
            background:#ffecec;
            border-left:6px solid #d90429;
            color:#b00020;
        }
        .back{
            display:inline-block;
            margin-top:20px;
            text-decoration:none;
            color:#1f3c88;
            font-weight:600;
        }
        @media(max-width:768px){
            form{
                grid-template-columns:1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Liver Disease Prediction</h1>

        <form action="/liver" method="POST">
            <div>
                <label>Age</label>
                <input type="number" name="age" step="1" required>
            </div>

            <div>
                <label>Gender</label>
                <select name="gender" required>
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <div>
                <label>Total Bilirubin</label>
                <input type="number" name="total_bilirubin" step="0.01" required>
            </div>

            <div>
                <label>Direct Bilirubin</label>
                <input type="number" name="direct_bilirubin" step="0.01" required>
            </div>

            <div>
                <label>Alkaline Phosphotase</label>
                <input type="number" name="alkaline_phosphotase" step="0.01" required>
            </div>

            <div>
                <label>Alamine Aminotransferase</label>
                <input type="number" name="alamine_aminotransferase" step="0.01" required>
            </div>

            <div>
                <label>Aspartate Aminotransferase</label>
                <input type="number" name="aspartate_aminotransferase" step="0.01" required>
            </div>

            <div>
                <label>Total Proteins</label>
                <input type="number" name="total_proteins" step="0.01" required>
            </div>

            <div>
                <label>Albumin</label>
                <input type="number" name="albumin" step="0.01" required>
            </div>

            <div>
                <label>Albumin / Globulin Ratio</label>
                <input type="number" name="albumin_globulin_ratio" step="0.01" required>
            </div>

            <button type="submit">Predict Liver Disease</button>
        </form>

        {% if prediction %}
        <div class="result">
            <h3>Prediction Result</h3>
            <p><strong>{{ prediction }}</strong></p>
            {% if probability is not none %}
            <p>Confidence: {{ probability }}%</p>
            {% endif %}
        </div>
        {% endif %}

        <a href="/" class="back">← Back to Home</a>
    </div>
</body>
</html>
